services:

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector
    command: ["--config=/etc/otel/config.yaml"]
    environment:
      - CRIBL_ENDPOINT=${CRIBL_ENDPOINT}
    volumes:
      - ./otel-config.yaml:/etc/otel/config.yaml
    ports:
      - "4317:4317"   # OTLP gRPC (receives from telemetrygen)
      - "55679:55679" # zpages debug UI — http://localhost:55679/debug/tracez


  telemetrygen-traces-frontend:
    image: ghcr.io/open-telemetry/opentelemetry-collector-contrib/telemetrygen:latest
    container_name: telemetrygen-traces-frontend
    depends_on:
      - otel-collector
    restart: on-failure
    command:
      - traces
      - --otlp-endpoint=otel-collector:4317
      - --otlp-insecure
      - --rate=20
      - --workers=1
      - --duration=inf
      - --service=workshop-frontend
      - --child-spans=4
      - --otlp-attributes=deployment.environment="production"
      - --otlp-attributes=service.version="2.4.1"
      - --telemetry-attributes=http.method="GET"
      - --telemetry-attributes=http.route="/checkout"
      - --telemetry-attributes=http.status_code="200"
      - --telemetry-attributes=region="us-east-1"

  telemetrygen-traces-checkout:
    image: ghcr.io/open-telemetry/opentelemetry-collector-contrib/telemetrygen:latest
    container_name: telemetrygen-traces-checkout
    depends_on:
      - otel-collector
    restart: on-failure
    command:
      - traces
      - --otlp-endpoint=otel-collector:4317
      - --otlp-insecure
      - --rate=10
      - --workers=1
      - --duration=inf
      - --service=workshop-checkout
      - --child-spans=4
      - --otlp-attributes=deployment.environment="production"
      - --otlp-attributes=service.version="1.7.0"
      - --telemetry-attributes=customer.tier="premium"
      - --telemetry-attributes=payment.method="card"
      - --telemetry-attributes=cart.item_count="3"
      - --telemetry-attributes=region="us-east-1"

  telemetrygen-traces-payment:
    image: ghcr.io/open-telemetry/opentelemetry-collector-contrib/telemetrygen:latest
    container_name: telemetrygen-traces-payment
    depends_on:
      - otel-collector
    restart: on-failure
    command:
      - traces
      - --otlp-endpoint=otel-collector:4317
      - --otlp-insecure
      - --rate=3
      - --workers=1
      - --duration=inf
      - --service=workshop-payment
      - --child-spans=4
      - --otlp-attributes=deployment.environment="production"
      - --otlp-attributes=service.version="3.1.2"
      - --telemetry-attributes=processor.name="stripe"
      - --telemetry-attributes=card.type="visa"
      - --telemetry-attributes=transaction.currency="USD"
      - --telemetry-attributes=region="us-east-1"

  telemetrygen-logs-info:
    image: ghcr.io/open-telemetry/opentelemetry-collector-contrib/telemetrygen:latest
    container_name: telemetrygen-logs-info
    depends_on:
      - otel-collector
    restart: on-failure
    command:
      - logs
      - --otlp-endpoint=otel-collector:4317
      - --otlp-insecure
      - --rate=10
      - --workers=1
      - --duration=inf
      - --service=workshop-logging-service
      - --severity-text=INFO
      - --severity-number=9
      - --body=good message

  telemetrygen-logs-error:
    image: ghcr.io/open-telemetry/opentelemetry-collector-contrib/telemetrygen:latest
    container_name: telemetrygen-logs-error
    depends_on:
      - otel-collector
    restart: on-failure
    command:
      - logs
      - --otlp-endpoint=otel-collector:4317
      - --otlp-insecure
      - --rate=1
      - --workers=1
      - --duration=inf
      - --service=workshop-logging-service
      - --severity-text=ERROR
      - --severity-number=17
      - --body=bad message

  # Synthetic LLM telemetry generator. Emits OTel GenAI-shaped spans with
  # realistic prompt/completion bodies, token counts, per-call cost, model
  # mix, and a small percentage of errors and slow-tail latencies.
  # Powers the workshop's AI-observability demos: PII masking on prompts,
  # cost-per-route aggregation, prompt/completion archival to Lake, and
  # outcome-aware tail sampling.
  # Source in ./genaitelgen/ — see main.py for the full attribute schema.
  genaitelgen:
    build: ./genaitelgen
    container_name: genaitelgen
    depends_on:
      - otel-collector
    restart: on-failure
    environment:
      OTLP_ENDPOINT: otel-collector:4317
      SERVICE_NAME: workshop-ai-assistant
      SERVICE_VERSION: 1.0.0
      DEPLOYMENT_ENV: production
      RATE_PER_SEC: "2"
