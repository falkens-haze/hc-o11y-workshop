services:

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    ports:
      - "9100:9100"

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector
    depends_on:
      - node-exporter
    command: ["--config=/etc/otel/config.yaml"]
    environment:
      - CRIBL_ENDPOINT=${CRIBL_ENDPOINT}
    volumes:
      - ./otel-config.yaml:/etc/otel/config.yaml
    ports:
      - "4317:4317"
      - "55679:55679"


  telemetrygen-traces-frontend:
    image: ghcr.io/open-telemetry/opentelemetry-collector-contrib/telemetrygen:latest
    container_name: telemetrygen-traces-frontend
    depends_on:
      - otel-collector
    restart: on-failure
    command:
      - traces
      - --otlp-endpoint=otel-collector:4317
      - --otlp-insecure
      - --rate=20
      - --workers=1
      - --duration=inf
      - --service=workshop-frontend
      - --child-spans=4
      - --otlp-attributes=deployment.environment="production"
      - --otlp-attributes=service.version="2.4.1"
      - --telemetry-attributes=http.method="GET"
      - --telemetry-attributes=http.route="/checkout"
      - --telemetry-attributes=http.status_code="200"
      - --telemetry-attributes=region="us-east-1"

  telemetrygen-traces-checkout:
    image: ghcr.io/open-telemetry/opentelemetry-collector-contrib/telemetrygen:latest
    container_name: telemetrygen-traces-checkout
    depends_on:
      - otel-collector
    restart: on-failure
    command:
      - traces
      - --otlp-endpoint=otel-collector:4317
      - --otlp-insecure
      - --rate=10
      - --workers=1
      - --duration=inf
      - --service=workshop-checkout
      - --child-spans=4
      - --otlp-attributes=deployment.environment="production"
      - --otlp-attributes=service.version="1.7.0"
      - --telemetry-attributes=customer.tier="premium"
      - --telemetry-attributes=payment.method="card"
      - --telemetry-attributes=cart.item_count="3"
      - --telemetry-attributes=region="us-east-1"

  telemetrygen-traces-payment:
    image: ghcr.io/open-telemetry/opentelemetry-collector-contrib/telemetrygen:latest
    container_name: telemetrygen-traces-payment
    depends_on:
      - otel-collector
    restart: on-failure
    command:
      - traces
      - --otlp-endpoint=otel-collector:4317
      - --otlp-insecure
      - --rate=3
      - --workers=1
      - --duration=inf
      - --service=workshop-payment
      - --child-spans=4
      - --otlp-attributes=deployment.environment="production"
      - --otlp-attributes=service.version="3.1.2"
      - --telemetry-attributes=processor.name="stripe"
      - --telemetry-attributes=card.type="visa"
      - --telemetry-attributes=transaction.currency="USD"
      - --telemetry-attributes=region="us-east-1"


  workshop-logs:
    build: ./workshop-log-gen
    container_name: workshop-log-gen
    depends_on:
      - otel-collector
    restart: on-failure
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: otel-collector:4317
      OTEL_INSECURE: "true"
      LOG_RATE_EPS: "3"


  genaitelgen:
    build: ./genaitelgen
    container_name: genaitelgen
    depends_on:
      - otel-collector
    restart: on-failure
    environment:
      OTLP_ENDPOINT: otel-collector:4317
      SERVICE_NAME: workshop-ai-assistant
      SERVICE_VERSION: 1.0.0
      DEPLOYMENT_ENV: production
      RATE_PER_SEC: "2"
